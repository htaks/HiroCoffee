<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#fbf5ec">
  <link rel="icon" href="images/hiro_coffee_logo.png">
  <link rel="apple-touch-icon" href="images/hiro_coffee_logo.png">
  <title>Hiro Coffee - 予約管理</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.49.4/dist/umd/supabase.min.js"></script>
  <script src="config.js"></script>
  <script src="menu-prices.js"></script>
  <script src="demo-store.js"></script>
  <style>
    .admin-header {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 6px;
    }
    .admin-title { margin: 0; font-size: 22px; font-weight: 700; color: #3f2f1e; }
    .admin-sub { margin: 0; color: var(--muted); font-size: 14px; }

    .stats {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin: 10px 0 0;
    }
    .stat {
      padding: 8px 14px;
      border-radius: 999px;
      background: #fffaf3;
      border: 1px solid rgba(99, 73, 47, 0.2);
      font-weight: 700;
      color: #3f2f1e;
      font-size: 14px;
    }
    .stat strong { color: var(--primary2); margin-left: 6px; }

    .filter-row {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin: 16px 0 14px;
      align-items: center;
    }
    .filter-row .spacer { flex: 1; }

    .res-list {
      display: grid;
      gap: 12px;
    }

    .res-empty {
      padding: 24px;
      text-align: center;
      color: var(--muted);
      background: #fffaf3;
      border: 1px dashed rgba(99, 73, 47, 0.25);
      border-radius: 14px;
    }

    .res-item {
      border: 1px solid rgba(99, 73, 47, 0.18);
      border-radius: 14px;
      background: #fffaf3;
      padding: 14px 16px;
      display: grid;
      gap: 10px;
      transition: box-shadow 0.3s ease, border-color 0.3s ease;
    }
    .res-item:hover {
      box-shadow: 0 10px 24px rgba(63, 47, 30, 0.10);
      border-color: rgba(120, 53, 15, 0.32);
    }
    .res-item--done { opacity: 0.7; }

    .res-head {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 10px;
      justify-content: space-between;
    }

    .res-name {
      font-weight: 800;
      font-size: 16px;
      color: #3f2f1e;
    }
    .res-meta {
      color: var(--muted);
      font-size: 13px;
    }

    .status-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 4px 10px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 800;
      letter-spacing: 0.3px;
    }
    .status-badge--pending {
      background: #fef3c7;
      color: #92400e;
      border: 1px solid #fcd34d;
    }
    .status-badge--done {
      background: #dcfce7;
      color: #166534;
      border: 1px solid #86efac;
    }

    .res-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 6px 14px;
      font-size: 14px;
      color: #3f2f1e;
    }
    .res-grid dt {
      color: var(--muted);
      font-size: 12px;
      font-weight: 700;
    }
    .res-grid dd { margin: 0 0 4px 0; line-height: 1.6; }

    .res-name-row {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 8px;
    }
    .res-no {
      font-size: 18px;
      font-weight: 800;
      letter-spacing: 0.1em;
      color: #78350f;
      font-family: "Hiragino Mincho ProN", "Yu Mincho", serif;
    }
    .res-total {
      font-size: 17px;
      font-weight: 800;
      color: #78350f;
    }

    .res-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 4px;
    }
    .res-actions .btn { padding: 8px 12px; font-size: 13px; }

    .btn-danger {
      color: #9f1239;
      border-color: rgba(159, 18, 57, 0.35);
      background: #ffffff;
    }
    .btn-danger:hover { background: #fff1f2; }

    .toast {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%) translateY(20px);
      background: #3f2f1e;
      color: #fffaf3;
      padding: 10px 16px;
      border-radius: 999px;
      font-size: 13px;
      font-weight: 700;
      box-shadow: 0 12px 28px rgba(63, 47, 30, 0.25);
      opacity: 0;
      transition: opacity 0.3s ease, transform 0.3s ease;
      pointer-events: none;
      z-index: 80;
    }
    .toast.is-visible {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    .config-warning {
      background: #fff1f2;
      border: 1px solid #fecdd3;
      color: #9f1239;
      padding: 12px 14px;
      border-radius: 14px;
      margin: 14px 0;
      font-size: 14px;
    }
    .config-warning code {
      background: #ffffff;
      padding: 1px 6px;
      border-radius: 6px;
      border: 1px solid #fecdd3;
    }

    .demo-banner {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
      background: #fef3c7;
      border: 1px solid #fcd34d;
      color: #92400e;
      padding: 10px 14px;
      border-radius: 12px;
      margin: 12px 0 0;
      font-size: 13px;
      line-height: 1.55;
    }
    .demo-banner[hidden] { display: none; }
    .demo-banner strong { font-weight: 900; }
    .demo-banner code {
      background: #ffffff;
      padding: 1px 6px;
      border-radius: 6px;
      border: 1px solid #fcd34d;
    }
    .demo-banner .btn-danger { margin-left: auto; }

    @media (min-width: 640px) {
      .res-grid { grid-template-columns: max-content 1fr max-content 1fr; }
    }

    .admin-user {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      padding: 6px 12px;
      border-radius: 999px;
      background: #fffaf3;
      border: 1px solid rgba(99, 73, 47, 0.18);
    }
    .admin-user[hidden] { display: none; }
    .admin-user__email {
      font-weight: 700;
      font-size: 13px;
      color: #3f2f1e;
      max-width: 180px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .admin-user__logout {
      padding: 6px 10px;
      font-size: 12.5px;
      min-height: 32px;
    }

    .login-card { max-width: 460px; margin: 0 auto; }
    .login-card[hidden] { display: none; }
    .login-card h2 { font-size: 20px; }
    .login-card .field input { font-size: 16px; }
    .login-note { min-height: 1.4em; }
    .login-note.is-error { color: #9f1239; }

    .line-badge {
      display: inline-flex;
      align-items: center;
      padding: 3px 8px;
      border-radius: 999px;
      font-size: 11px;
      font-weight: 800;
    }
    .line-badge--ok {
      background: #fffaf3;
      color: #78350f;
      border: 1px solid rgba(120, 53, 15, 0.22);
    }
    .line-badge--ng {
      background: #fef3c7;
      color: #92400e;
      border: 1px solid #fcd34d;
    }
    .line-badge--sent {
      background: #f5efe6;
      color: #78350f;
      border: 1px solid rgba(120, 53, 15, 0.18);
    }
    .bag-badge {
      display: inline-flex;
      align-items: center;
      padding: 3px 8px;
      border-radius: 999px;
      font-size: 11px;
      font-weight: 800;
      background: #fff7ed;
      color: #9a3412;
      border: 1px solid rgba(180, 83, 9, 0.25);
    }
    .btn-notify-line {
      color: #78350f;
      border-color: rgba(120, 53, 15, 0.28);
      background: #fffaf3;
    }
    .btn-notify-line:hover { background: #f6efe1; }
  </style>
</head>
<body>
  <div class="wrap">
    <section class="card login-card" id="loginCard" hidden>
      <h2>管理画面ログイン</h2>
      <p class="muted">Supabase に登録した管理者アカウントでログインしてください。</p>
      <form id="loginForm" class="form" autocomplete="on">
        <label class="field">
          <span>メールアドレス</span>
          <input
            name="email"
            type="email"
            required
            autocomplete="email"
            inputmode="email"
            autocapitalize="off"
            spellcheck="false"
            enterkeyhint="next"
            placeholder="you@example.com"
          >
        </label>
        <label class="field">
          <span>パスワード</span>
          <input
            name="password"
            type="password"
            required
            autocomplete="current-password"
            enterkeyhint="go"
            minlength="6"
          >
        </label>
        <div class="actions">
          <button type="submit" class="btn btn-primary">ログイン</button>
        </div>
        <p id="loginNote" class="note login-note" role="status" aria-live="polite"></p>
      </form>
    </section>

    <section class="card" id="adminCard">
      <div class="admin-header">
        <div>
          <h1 class="admin-title">予約管理</h1>
          <p class="admin-sub">テイクアウト予約の一覧と対応状況を管理します。</p>
        </div>
        <div class="actions">
          <span class="admin-user" id="adminUser" hidden>
            <span class="admin-user__email" id="adminUserEmail" title="ログイン中のメールアドレス"></span>
            <button class="btn admin-user__logout" id="logoutBtn" type="button">ログアウト</button>
          </span>
          <button class="btn" id="refreshBtn" type="button">最新化</button>
          <a class="btn" href="index.html">公開ページへ</a>
        </div>
      </div>

      <div id="demoBanner" class="demo-banner" hidden>
        <span>
          <strong>デモモードで表示中。</strong>
          予約データはこのブラウザの <code>localStorage</code> に保存されます。
          本番運用するには <code>config.js</code> の <code>SUPABASE_URL</code> と <code>SUPABASE_ANON_KEY</code> を設定してください。
        </span>
        <button type="button" class="btn" id="addSampleBtn">サンプル予約を追加</button>
        <button type="button" class="btn" id="debugStateBtn">データ状態を表示</button>
        <button type="button" class="btn btn-danger" id="clearDemoBtn">デモデータを全削除</button>
      </div>

      <div class="stats" id="stats">
        <span class="stat">未対応 <strong id="statPending">0</strong></span>
        <span class="stat">対応済み <strong id="statDone">0</strong></span>
        <span class="stat">合計 <strong id="statTotal">0</strong></span>
      </div>

      <div class="filter-row">
        <div class="chips" role="tablist" aria-label="ステータスで絞り込み">
          <button type="button" class="chip is-active" data-filter="all">すべて</button>
          <button type="button" class="chip" data-filter="pending">未対応</button>
          <button type="button" class="chip" data-filter="done">対応済み</button>
        </div>
      </div>

      <div class="res-list" id="resList" aria-live="polite"></div>
    </section>
  </div>

  <div class="toast" id="toast" role="status"></div>

  <script>
    const cfg = window.HIRO_CONFIG || {};

    const demoStore = window.HIRO_DEMO_STORE;
    const isConfigured = demoStore
      ? demoStore.isSupabaseConfigured(cfg)
      : (
          cfg.SUPABASE_URL &&
          cfg.SUPABASE_URL.indexOf("YOUR-") === -1 &&
          cfg.SUPABASE_ANON_KEY &&
          cfg.SUPABASE_ANON_KEY.indexOf("YOUR-") === -1
        );

    const ADMIN_SESSION_KEY = "hiro-admin-session";

    function isSessionValid(session) {
      if (!session || !session.access_token) return false;
      if (!session.expires_at) return true;
      return session.expires_at * 1000 > Date.now() + 60_000;
    }

    function loadSavedSession() {
      try {
        const raw = sessionStorage.getItem(ADMIN_SESSION_KEY);
        if (!raw) return null;
        const session = JSON.parse(raw);
        if (!isSessionValid(session)) {
          sessionStorage.removeItem(ADMIN_SESSION_KEY);
          return null;
        }
        return session;
      } catch (err) {
        console.warn("[admin] failed to load saved session", err);
        return null;
      }
    }

    function saveSession(session) {
      sessionStorage.setItem(ADMIN_SESSION_KEY, JSON.stringify({
        access_token: session.access_token,
        refresh_token: session.refresh_token,
        expires_at: session.expires_at,
        user: {
          id: session.user.id,
          email: session.user.email,
        },
      }));
    }

    function clearSession() {
      sessionStorage.removeItem(ADMIN_SESSION_KEY);
    }

    function createAuthClient() {
      return window.supabase.createClient(cfg.SUPABASE_URL, cfg.SUPABASE_ANON_KEY, {
        auth: {
          persistSession: false,
          autoRefreshToken: false,
          detectSessionInUrl: false,
        },
      });
    }

    function createDataClient(session) {
      const options = {
        auth: {
          persistSession: false,
          autoRefreshToken: false,
          detectSessionInUrl: false,
        },
      };
      if (session && session.access_token) {
        options.global = {
          headers: {
            Authorization: "Bearer " + session.access_token,
          },
        };
      }
      return window.supabase.createClient(cfg.SUPABASE_URL, cfg.SUPABASE_ANON_KEY, options);
    }

    let adminSession = loadSavedSession();
    const authClient = isConfigured && window.supabase ? createAuthClient() : null;
    let supabaseClient = isConfigured && window.supabase
      ? createDataClient(adminSession)
      : null;
    if (supabaseClient) {
      window._supabaseClient = supabaseClient;
    }

    const useDemo = !supabaseClient && !!demoStore;

    if (useDemo) {
      document.getElementById("demoBanner").hidden = false;
    }

    let allReservations = [];
    let currentFilter = "all";

    const resList = document.getElementById("resList");
    const toastEl = document.getElementById("toast");
    const loginCard = document.getElementById("loginCard");
    const adminCard = document.getElementById("adminCard");
    const loginForm = document.getElementById("loginForm");
    const loginNote = document.getElementById("loginNote");
    const adminUser = document.getElementById("adminUser");
    const adminUserEmail = document.getElementById("adminUserEmail");
    const logoutBtn = document.getElementById("logoutBtn");

    function showToast(msg) {
      toastEl.textContent = msg;
      toastEl.classList.add("is-visible");
      clearTimeout(showToast._t);
      showToast._t = setTimeout(() => toastEl.classList.remove("is-visible"), 2400);
    }

    function fmtDate(iso) {
      if (!iso) return "";
      try {
        const d = new Date(iso);
        return d.toLocaleString("ja-JP", {
          year: "numeric", month: "2-digit", day: "2-digit",
          hour: "2-digit", minute: "2-digit"
        });
      } catch { return iso; }
    }

    function escapeHtml(s) {
      return String(s == null ? "" : s)
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#39;");
    }

    function formatMenuItems(item) {
      if (!item) return "（なし）";
      return String(item)
        .split("、")
        .map((part) => escapeHtml(part.trim()))
        .filter(Boolean)
        .join("<br>");
    }

    function getReservationTotal(r) {
      if (r.total_amount != null && r.total_amount !== "") {
        return Number(r.total_amount);
      }
      const mp = window.HIRO_MENU_PRICES;
      if (mp) return mp.calcTotalFromItemString(r.item, r.wants_bag);
      return 0;
    }

    function formatReservationTotal(r) {
      const mp = window.HIRO_MENU_PRICES;
      const amount = getReservationTotal(r);
      return mp ? mp.formatYen(amount) : "¥" + amount;
    }

    function render() {
      const list = allReservations.filter(
        (r) => currentFilter === "all" || r.status === currentFilter
      );

      const pending = allReservations.filter((r) => r.status === "pending").length;
      const done = allReservations.filter((r) => r.status === "done").length;
      document.getElementById("statPending").textContent = pending;
      document.getElementById("statDone").textContent = done;
      document.getElementById("statTotal").textContent = allReservations.length;

      if (list.length === 0) {
        resList.innerHTML =
          '<div class="res-empty">該当する予約はありません。</div>';
        return;
      }

      resList.innerHTML = list.map((r) => {
        const isDone = r.status === "done";
        const badgeClass = isDone ? "status-badge--done" : "status-badge--pending";
        const badgeText = isDone ? "対応済み" : "未対応";
        const toggleLabel = isDone ? "未対応に戻す" : "対応済みにする";
        const toggleAction = isDone ? "pending" : "done";
        const hasLine = !!r.line_user_id;
        const bagBadge = r.wants_bag
          ? '<span class="bag-badge">手さげ袋希望（10円）</span>'
          : "";
        const lineBadge = hasLine
          ? (r.line_notified_at
            ? '<span class="line-badge line-badge--sent">LINE通知済</span>'
            : '<span class="line-badge line-badge--ok">LINE連携済</span>')
          : '<span class="line-badge line-badge--ng">LINE未連携</span>';
        const notifyBtn = (!isDone && hasLine)
          ? '<button class="btn btn-notify-line" data-action="notify-line">準備完了・LINE通知</button>'
          : "";

        return (
          '<article class="res-item ' + (isDone ? "res-item--done" : "") + '" data-id="' + escapeHtml(r.id) + '">' +
            '<div class="res-head">' +
              '<div>' +
                '<div class="res-name-row">' +
                  '<div class="res-name">' + escapeHtml(r.name) + ' 様 ' + lineBadge + bagBadge + '</div>' +
                '</div>' +
                '<div class="res-meta">受付: ' + escapeHtml(fmtDate(r.created_at)) +
                  (r.line_notified_at ? ' · LINE通知: ' + escapeHtml(fmtDate(r.line_notified_at)) : '') +
                '</div>' +
              '</div>' +
              '<span class="status-badge ' + badgeClass + '">' + badgeText + '</span>' +
            '</div>' +
            '<dl class="res-grid">' +
              (r.reservation_no
                ? '<dt>予約番号</dt><dd><strong class="res-no">' + escapeHtml(r.reservation_no) + '</strong></dd>'
                : '') +
              '<dt>メニュー</dt><dd>' + formatMenuItems(r.item) + '</dd>' +
              '<dt>合計金額</dt><dd><strong class="res-total">' + escapeHtml(formatReservationTotal(r)) + '</strong></dd>' +
              '<dt>受取時間</dt><dd>' + escapeHtml(r.time) + '</dd>' +
              '<dt>手さげ袋希望（10円）</dt><dd>' + (r.wants_bag ? '<strong>あり</strong>' : 'なし') + '</dd>' +
              '<dt>追加要望</dt><dd>' + (r.note ? escapeHtml(r.note) : "（なし）") + '</dd>' +
            '</dl>' +
            '<div class="res-actions">' +
              notifyBtn +
              '<button class="btn btn-primary" data-action="toggle" data-next="' + toggleAction + '">' + toggleLabel + '</button>' +
              '<button class="btn btn-danger" data-action="delete">削除</button>' +
            '</div>' +
          '</article>'
        );
      }).join("");
    }

    async function loadAll() {
      if (useDemo) {
        try {
          allReservations = await demoStore.listAll();
        } catch (e) {
          console.error(e);
          allReservations = [];
        }
        render();
        return;
      }
      if (!supabaseClient) {
        allReservations = [];
        render();
        return;
      }
      try {
        const { data, error } = await supabaseClient
          .from("reservations")
          .select("*")
          .order("created_at", { ascending: false });
        if (error) {
          console.error(error);
          showToast("読み込み失敗：" + error.message);
          return;
        }
        allReservations = data || [];
        render();
      } catch (err) {
        console.error(err);
        showToast("通信エラー：config.js の SUPABASE_URL をご確認ください。");
      }
    }

    async function updateStatus(id, status) {
      if (useDemo) {
        const updated = await demoStore.updateStatus(id, status);
        if (!updated) return;
        const r = allReservations.find((x) => String(x.id) === String(id));
        if (r) r.status = status;
        render();
        showToast(status === "done" ? "対応済みに変更しました" : "未対応に戻しました");
        return;
      }
      if (!supabaseClient) return;
      const { error } = await supabaseClient
        .from("reservations")
        .update({ status })
        .eq("id", id);
      if (error) {
        showToast("更新失敗：" + error.message);
        return;
      }
      const r = allReservations.find((x) => String(x.id) === String(id));
      if (r) r.status = status;
      render();
      showToast(status === "done" ? "対応済みに変更しました" : "未対応に戻しました");
    }

    async function notifyLineReady(id) {
      const r = allReservations.find((x) => String(x.id) === String(id));
      if (!r) return;
      if (!r.line_user_id) {
        showToast("LINE未連携の予約です");
        return;
      }
      if (!confirm(r.name + " 様に「準備完了」を LINE で通知しますか？")) return;

      if (useDemo) {
        const updated = await demoStore.updateStatus(id, "done");
        if (!updated) return;
        r.status = "done";
        r.line_notified_at = new Date().toISOString();
        render();
        showToast("（デモ）LINE通知を送信しました");
        return;
      }

      if (!adminSession || !adminSession.access_token) {
        showToast("ログインが必要です");
        return;
      }

      try {
        const res = await fetch(cfg.SUPABASE_URL + "/functions/v1/notify-ready", {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
            Authorization: "Bearer " + adminSession.access_token,
            apikey: cfg.SUPABASE_ANON_KEY,
          },
          body: JSON.stringify({ reservation_id: id }),
        });
        const data = await res.json().catch(() => ({}));
        if (!res.ok) {
          showToast("LINE通知失敗：" + (data.error || res.statusText));
          if (data.detail) console.error("[admin] LINE notify detail", data.detail);
          return;
        }
        r.status = "done";
        r.line_notified_at = new Date().toISOString();
        render();
        showToast("LINEで準備完了を通知しました");
      } catch (err) {
        console.error(err);
        showToast("通信エラーで LINE 通知できませんでした");
      }
    }

    async function deleteRow(id) {
      if (!confirm("この予約を削除しますか？")) return;
      if (useDemo) {
        const removed = await demoStore.remove(id);
        if (!removed) return;
        allReservations = allReservations.filter((x) => String(x.id) !== String(id));
        render();
        showToast("削除しました");
        return;
      }
      if (!supabaseClient) return;
      const { error } = await supabaseClient
        .from("reservations")
        .delete()
        .eq("id", id);
      if (error) {
        showToast("削除失敗：" + error.message);
        return;
      }
      allReservations = allReservations.filter((x) => String(x.id) !== String(id));
      render();
      showToast("削除しました");
    }

    // フィルターチップ
    document.querySelectorAll("[data-filter]").forEach((chip) => {
      chip.addEventListener("click", () => {
        document.querySelectorAll("[data-filter]").forEach((c) =>
          c.classList.toggle("is-active", c === chip)
        );
        currentFilter = chip.getAttribute("data-filter");
        render();
      });
    });

    // リスト内ボタンの委譲
    resList.addEventListener("click", (e) => {
      const btn = e.target.closest("button[data-action]");
      if (!btn) return;
      const item = btn.closest(".res-item");
      const id = item && item.getAttribute("data-id");
      if (!id) return;
      const action = btn.getAttribute("data-action");
      if (action === "toggle") {
        const next = btn.getAttribute("data-next");
        updateStatus(id, next);
      } else if (action === "notify-line") {
        notifyLineReady(id);
      } else if (action === "delete") {
        deleteRow(id);
      }
    });

    document.getElementById("refreshBtn").addEventListener("click", () => {
      loadAll().then(() => showToast("最新の予約に更新しました"));
    });

    let realtimeChannel = null;
    let adminBooted = false;

    function resetDataClient() {
      if (realtimeChannel) {
        try { realtimeChannel.unsubscribe(); } catch (e) {}
        realtimeChannel = null;
      }
      adminBooted = false;
      supabaseClient = createDataClient(adminSession);
      window._supabaseClient = supabaseClient;
    }

    function bootAdminWithSupabase() {
      if (adminBooted) {
        loadAll();
        return;
      }
      adminBooted = true;
      loadAll();
      realtimeChannel = supabaseClient
        .channel("reservations-live")
        .on(
          "postgres_changes",
          { event: "*", schema: "public", table: "reservations" },
          (payload) => {
            if (payload.eventType === "INSERT") {
              allReservations.unshift(payload.new);
              render();
              showToast("新しい予約が入りました：" + (payload.new.name || ""));
            } else if (payload.eventType === "UPDATE") {
              const i = allReservations.findIndex((r) => r.id === payload.new.id);
              if (i >= 0) allReservations[i] = payload.new;
              render();
            } else if (payload.eventType === "DELETE") {
              allReservations = allReservations.filter((r) => r.id !== payload.old.id);
              render();
            }
          }
        )
        .subscribe();
    }

    function showLoggedIn(user) {
      loginCard.hidden = true;
      adminCard.hidden = false;
      adminUser.hidden = false;
      adminUserEmail.textContent = user.email || "";
      bootAdminWithSupabase();
    }

    function showLoggedOut() {
      loginCard.hidden = false;
      adminCard.hidden = true;
      adminUser.hidden = true;
      adminUserEmail.textContent = "";
      allReservations = [];
      render();
      if (realtimeChannel) {
        try { realtimeChannel.unsubscribe(); } catch (e) {}
        realtimeChannel = null;
      }
      adminBooted = false;
    }

    if (authClient) {
      if (adminSession && adminSession.user) {
        showLoggedIn(adminSession.user);
        console.info("[admin] restored session", {
          user_email: adminSession.user.email,
          expires_at: adminSession.expires_at,
        });
      } else {
        showLoggedOut();
      }

      loginForm.addEventListener("submit", async (e) => {
        e.preventDefault();
        const fd = new FormData(loginForm);
        const email = String(fd.get("email") || "").trim();
        const password = String(fd.get("password") || "");
        const submitBtn = loginForm.querySelector('button[type="submit"]');
        loginNote.classList.remove("is-error");
        loginNote.textContent = "ログイン中…";
        if (submitBtn) submitBtn.disabled = true;
        try {
          const { data, error } = await authClient.auth.signInWithPassword({ email, password });
          if (error) {
            loginNote.textContent = "ログインに失敗しました：" + (error.message || "情報をご確認ください。");
            loginNote.classList.add("is-error");
            return;
          }
          if (!data.session) {
            loginNote.textContent = "ログイン応答にセッションがありません。メール確認が必要な可能性があります。";
            loginNote.classList.add("is-error");
            return;
          }

          adminSession = {
            access_token: data.session.access_token,
            refresh_token: data.session.refresh_token,
            expires_at: data.session.expires_at,
            user: {
              id: data.session.user.id,
              email: data.session.user.email,
            },
          };
          saveSession(adminSession);
          resetDataClient();
          showLoggedIn(adminSession.user);
          loginNote.textContent = "";
          console.info("[admin] login-success", {
            user_email: adminSession.user.email,
            expires_at: adminSession.expires_at,
            has_token: !!adminSession.access_token,
          });
        } catch (err) {
          console.error("[admin] login error", err);
          loginNote.textContent = "通信エラーでログインできませんでした。";
          loginNote.classList.add("is-error");
        } finally {
          if (submitBtn) submitBtn.disabled = false;
        }
      });

      logoutBtn.addEventListener("click", async () => {
        clearSession();
        adminSession = null;
        resetDataClient();
        showLoggedOut();
        showToast("ログアウトしました");
      });
    } else if (useDemo) {
      loadAll();
      demoStore.onChange((event, payload) => {
        if (event === "INSERT" && payload) {
          if (!allReservations.some((r) => String(r.id) === String(payload.id))) {
            allReservations.unshift(payload);
            render();
            showToast("新しい予約が入りました：" + (payload.name || ""));
          }
        } else if (event === "UPDATE" && payload) {
          const i = allReservations.findIndex((r) => String(r.id) === String(payload.id));
          if (i >= 0) allReservations[i] = payload;
          render();
        } else if (event === "DELETE" && payload) {
          allReservations = allReservations.filter((r) => String(r.id) !== String(payload.id));
          render();
        } else if (event === "REFRESH") {
          loadAll();
        }
      });

      const clearBtn = document.getElementById("clearDemoBtn");
      if (clearBtn) {
        clearBtn.addEventListener("click", async () => {
          if (!confirm("デモデータをすべて削除しますか？")) return;
          const items = await demoStore.listAll();
          for (const r of items) await demoStore.remove(r.id);
          allReservations = [];
          render();
          showToast("デモデータを全削除しました");
        });
      }

      const debugBtn = document.getElementById("debugStateBtn");
      if (debugBtn) {
        debugBtn.addEventListener("click", () => {
          const raw = localStorage.getItem(demoStore.STORAGE_KEY);
          let parsedCount = 0;
          try {
            const arr = raw ? JSON.parse(raw) : [];
            parsedCount = Array.isArray(arr) ? arr.length : 0;
          } catch (e) {}
          const info = [
            "=== Hiro Coffee デモストア状態 ===",
            "URL: " + location.href,
            "useDemo: " + useDemo,
            "demoStore: " + (demoStore ? "OK" : "NG"),
            "supabase: " + (supabaseClient ? "configured" : "なし"),
            "メモリ上の予約件数: " + allReservations.length,
            "localStorage 件数: " + parsedCount,
            "STORAGE_KEY: " + demoStore.STORAGE_KEY,
            "",
            "localStorage 生データ:",
            raw || "(なし)",
          ].join("\n");
          console.info(info);
          alert(info);
        });
      }

      const addSampleBtn = document.getElementById("addSampleBtn");
      if (addSampleBtn) {
        const samples = [
          { name: "コーヒー太郎", item: "カフェラテ", time: "12:30", note: "ミルク多めでお願いします" },
          { name: "サニー次郎", item: "チャイティーラテ", time: "14:00", note: "" },
          { name: "ベイク花子", item: "バスクチーズケーキ", time: "17:15", note: "テイクアウトで" },
        ];
        let nextIndex = 0;
        addSampleBtn.addEventListener("click", async () => {
          try {
            const sample = samples[nextIndex % samples.length];
            nextIndex++;
            console.info("[admin] add sample:", sample);
            const inserted = await demoStore.insert({ ...sample, status: "pending" });
            console.info("[admin] inserted:", inserted);
            // onChange 経由でも追加されるが、念のため強制再読込
            await loadAll();
            showToast("サンプル予約を追加しました：" + sample.name);
          } catch (err) {
            console.error("[admin] insert failed", err);
            showToast("サンプル追加に失敗しました：" + (err && err.message ? err.message : err));
          }
        });
      }
    } else {
      render();
    }
  </script>
</body>
</html>

name: Supabase sync (prod + staging)

on:
  push:
    branches: [main]
    paths:
      - "supabase/migrations/**"
      - "supabase/functions/**"
      - "scripts/sync-supabase-env.sh"
      - ".github/workflows/supabase-sync.yml"
  workflow_dispatch:

concurrency:
  group: supabase-sync
  cancel-in-progress: false

jobs:
  sync-production:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: supabase/setup-cli@v1
        with:
          version: latest
      - name: Check production secrets
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_DB_PASSWORD_PRODUCTION: ${{ secrets.SUPABASE_DB_PASSWORD_PRODUCTION }}
        run: |
          set -euo pipefail
          test -n "$SUPABASE_ACCESS_TOKEN" || { echo "Missing SUPABASE_ACCESS_TOKEN"; exit 1; }
          test -n "$SUPABASE_DB_PASSWORD_PRODUCTION" || { echo "Missing SUPABASE_DB_PASSWORD_PRODUCTION"; exit 1; }
          echo "Production secrets OK."
      - name: Sync production
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_PROJECT_REF_PRODUCTION: ytyllufahvcrmirxhlaf
          SUPABASE_DB_PASSWORD_PRODUCTION: ${{ secrets.SUPABASE_DB_PASSWORD_PRODUCTION }}
          LINE_LOGIN_CHANNEL_ID: "2010226071"
          LINE_LOGIN_CHANNEL_SECRET: ${{ secrets.LINE_LOGIN_CHANNEL_SECRET }}
          LINE_CHANNEL_ACCESS_TOKEN: ${{ secrets.LINE_CHANNEL_ACCESS_TOKEN }}
        run: bash scripts/sync-supabase-env.sh production

  sync-staging:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: supabase/setup-cli@v1
        with:
          version: latest
      - name: Check staging secrets
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_DB_PASSWORD_STAGING: ${{ secrets.SUPABASE_DB_PASSWORD_STAGING }}
          SUPABASE_PROJECT_REF_STAGING: ${{ secrets.SUPABASE_PROJECT_REF_STAGING }}
        run: |
          set -euo pipefail
          test -n "$SUPABASE_ACCESS_TOKEN" || { echo "Missing SUPABASE_ACCESS_TOKEN"; exit 1; }
          test -n "$SUPABASE_DB_PASSWORD_STAGING" || { echo "Missing SUPABASE_DB_PASSWORD_STAGING"; exit 1; }
          test -n "$SUPABASE_PROJECT_REF_STAGING" || { echo "Missing SUPABASE_PROJECT_REF_STAGING"; exit 1; }
          echo "Staging secrets OK."
      - name: Sync staging
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_PROJECT_REF_STAGING: ${{ secrets.SUPABASE_PROJECT_REF_STAGING }}
          SUPABASE_DB_PASSWORD_STAGING: ${{ secrets.SUPABASE_DB_PASSWORD_STAGING }}
          LINE_LOGIN_CHANNEL_ID: "2010226071"
          LINE_LOGIN_CHANNEL_SECRET: ${{ secrets.LINE_LOGIN_CHANNEL_SECRET }}
          LINE_CHANNEL_ACCESS_TOKEN: ${{ secrets.LINE_CHANNEL_ACCESS_TOKEN }}
        run: bash scripts/sync-supabase-env.sh staging

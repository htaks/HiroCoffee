<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LINE連携中 - Hiro Coffee</title>
  <script src="config.js"></script>
  <style>
    body {
      font-family: system-ui, sans-serif;
      display: grid;
      place-items: center;
      min-height: 100vh;
      margin: 0;
      background: #fbf5ec;
      color: #3f2f1e;
    }
  </style>
</head>
<body>
  <p id="status">LINE連携中です…</p>
  <script>
    (async () => {
      const LINE_USER_KEY = "hiro-line-user";
      const LINE_STATE_KEY = "hiro-line-oauth-state";
      const statusEl = document.getElementById("status");

      function setLineStore(key, value) {
        sessionStorage.setItem(key, value);
        localStorage.setItem(key, value);
      }

      function getLineStore(key) {
        return sessionStorage.getItem(key) || localStorage.getItem(key);
      }

      function removeLineStore(key) {
        sessionStorage.removeItem(key);
        localStorage.removeItem(key);
      }

      const params = new URLSearchParams(location.search);
      const code = params.get("code");
      const state = params.get("state");
      const oauthError = params.get("error");

      function goBack(path) {
        location.replace(new URL(path, location.href).href);
      }

      if (oauthError) {
        removeLineStore(LINE_STATE_KEY);
        goBack("index.html#line-error");
        return;
      }

      const savedState = getLineStore(LINE_STATE_KEY);
      removeLineStore(LINE_STATE_KEY);
      if (!code || !state || state !== savedState) {
        console.error("[line-callback] invalid state or missing code", {
          code: !!code,
          state: !!state,
          savedState: !!savedState,
        });
        goBack("index.html#line-error");
        return;
      }

      const cfg = window.HIRO_CONFIG || {};
      const redirectUri = cfg.LINE_OAUTH_REDIRECT_URI ||
        new URL("line-callback.html", location.href).href.split("?")[0];

      try {
        const res = await fetch(cfg.SUPABASE_URL + "/functions/v1/line-oauth", {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
            Authorization: "Bearer " + cfg.SUPABASE_ANON_KEY,
          },
          body: JSON.stringify({ code, redirect_uri: redirectUri }),
        });
        const data = await res.json();
        if (!res.ok) {
          throw new Error(data.error || "LINE連携に失敗しました");
        }

        setLineStore(LINE_USER_KEY, JSON.stringify({
          line_user_id: data.line_user_id,
          display_name: data.display_name || "",
        }));
        goBack("index.html#line-linked");
      } catch (err) {
        console.error(err);
        if (statusEl) {
          statusEl.textContent = "LINE連携に失敗しました。トップページに戻ります…";
        }
        goBack("index.html#line-error");
      }
    })();
  </script>
</body>
</html>

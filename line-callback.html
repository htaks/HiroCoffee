<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>LINE連携中 - Hiro Coffee</title>
  <script src="config.js?v=1.3.5"></script>
  <script src="site-env.js"></script>
  <style>
    body {
      font-family: system-ui, sans-serif;
      display: grid;
      place-items: center;
      min-height: 100vh;
      min-height: 100dvh;
      margin: 0;
      padding: 24px max(16px, env(safe-area-inset-right)) max(24px, env(safe-area-inset-bottom)) max(16px, env(safe-area-inset-left));
      background: #fbf5ec;
      color: #3f2f1e;
    }
    main {
      width: min(100%, 360px);
      display: grid;
      gap: 16px;
      text-align: center;
    }
    #status {
      margin: 0;
      line-height: 1.7;
    }
    .friend-add-btn,
    .friend-done-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 48px;
      padding: 14px 18px;
      border-radius: 14px;
      font-weight: 800;
      text-decoration: none;
      border: 0;
      cursor: pointer;
      font: inherit;
    }
    .friend-add-btn {
      background: #06c755;
      color: #fff;
      box-shadow: 0 8px 20px rgba(6, 199, 85, 0.28);
    }
    .friend-done-btn {
      background: #fff;
      color: #3f2f1e;
      border: 1px solid rgba(63, 47, 30, 0.18);
    }
    .friend-add-btn[hidden],
    .friend-done-btn[hidden] {
      display: none !important;
    }
  </style>
</head>
<body>
  <main>
    <p id="status">LINE連携中です…</p>
    <a id="friendAddBtn" class="friend-add-btn" hidden>Hiro Coffee を友だち追加</a>
    <button type="button" id="friendDoneBtn" class="friend-done-btn" hidden>友だち追加が完了した</button>
  </main>
  <script>
    (async () => {
      const cfg = window.HIRO_CONFIG || {};
      const storagePrefix = cfg.STORAGE_PREFIX || "hiro";
      const LINE_USER_KEY = storagePrefix + "-line-user";
      const LINE_STATE_KEY = storagePrefix + "-line-oauth-state";
      const LINE_PENDING_FRIEND_KEY = storagePrefix + "-line-pending-friend";
      const statusEl = document.getElementById("status");
      const friendAddBtn = document.getElementById("friendAddBtn");
      const friendDoneBtn = document.getElementById("friendDoneBtn");

      function setLineStore(key, value) {
        sessionStorage.setItem(key, value);
        localStorage.setItem(key, value);
      }

      function getLineStore(key) {
        return sessionStorage.getItem(key) || localStorage.getItem(key);
      }

      function removeLineStore(key) {
        sessionStorage.removeItem(key);
        localStorage.removeItem(key);
      }

      function goBack(path) {
        location.replace(new URL(path, location.href).href);
      }

      function getLineAddUrl() {
        const addUrl = String(cfg.LINE_ADD_URL || "").trim();
        return addUrl.indexOf("http") === 0 ? addUrl : "";
      }

      function showFriendAddUi(message) {
        if (statusEl) statusEl.textContent = message;
        const addUrl = getLineAddUrl();
        if (friendAddBtn && addUrl) {
          friendAddBtn.href = addUrl;
          friendAddBtn.hidden = false;
        }
        if (friendDoneBtn) friendDoneBtn.hidden = false;
      }

      async function verifyFriendAndContinue() {
        const raw = getLineStore(LINE_USER_KEY);
        if (!raw) {
          goBack("index.html");
          return;
        }

        let user;
        try {
          user = JSON.parse(raw);
        } catch (err) {
          goBack("index.html");
          return;
        }

        if (!user || !user.line_user_id) {
          goBack("index.html");
          return;
        }

        if (statusEl) statusEl.textContent = "友だち追加状態を確認中…";
        if (friendAddBtn) friendAddBtn.hidden = true;
        if (friendDoneBtn) friendDoneBtn.hidden = true;

        try {
          const res = await fetch(cfg.SUPABASE_URL + "/functions/v1/check-line-friend", {
            method: "POST",
            headers: {
              "Content-Type": "application/json",
              Authorization: "Bearer " + cfg.SUPABASE_ANON_KEY,
            },
            body: JSON.stringify({ line_user_id: user.line_user_id }),
          });
          const data = await res.json().catch(() => ({}));
          if (!res.ok) {
            throw new Error(data.error || "確認に失敗しました");
          }

          if (data.is_friend) {
            setLineStore(LINE_USER_KEY, JSON.stringify({
              line_user_id: user.line_user_id,
              display_name: user.display_name || "",
              is_friend: true,
            }));
            removeLineStore(LINE_PENDING_FRIEND_KEY);
            goBack("index.html#line-linked");
            return;
          }

          showFriendAddUi(
            "まだ友だち追加が確認できません。下のボタンから Hiro Coffee を友だち追加してください。"
          );
        } catch (err) {
          console.error(err);
          showFriendAddUi(
            "確認に失敗しました。友だち追加後にもう一度「友だち追加が完了した」をタップしてください。"
          );
        }
      }

      function openLineFriendAdd() {
        const addUrl = getLineAddUrl();
        if (!addUrl) return false;

        setLineStore(LINE_PENDING_FRIEND_KEY, "1");
        showFriendAddUi("友だち追加画面を開いています…");
        window.location.href = addUrl;
        return true;
      }

      if (friendAddBtn) {
        friendAddBtn.addEventListener("click", () => {
          setLineStore(LINE_PENDING_FRIEND_KEY, "1");
        });
      }
      if (friendDoneBtn) {
        friendDoneBtn.addEventListener("click", verifyFriendAndContinue);
      }

      document.addEventListener("visibilitychange", () => {
        if (document.visibilityState !== "visible") return;
        if (!getLineStore(LINE_PENDING_FRIEND_KEY)) return;
        verifyFriendAndContinue();
      });

      const params = new URLSearchParams(location.search);
      const code = params.get("code");
      const state = params.get("state");
      const oauthError = params.get("error");

      if (oauthError) {
        removeLineStore(LINE_STATE_KEY);
        goBack("index.html#line-error");
        return;
      }

      const savedState = getLineStore(LINE_STATE_KEY);
      removeLineStore(LINE_STATE_KEY);
      if (!code || !state || state !== savedState) {
        console.error("[line-callback] invalid state or missing code", {
          code: !!code,
          state: !!state,
          savedState: !!savedState,
        });
        goBack("index.html#line-error");
        return;
      }

      const redirectUri = cfg.LINE_OAUTH_REDIRECT_URI ||
        new URL("line-callback.html", location.href).href.split("?")[0];

      try {
        const res = await fetch(cfg.SUPABASE_URL + "/functions/v1/line-oauth", {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
            Authorization: "Bearer " + cfg.SUPABASE_ANON_KEY,
          },
          body: JSON.stringify({ code, redirect_uri: redirectUri }),
        });
        const data = await res.json();
        if (!res.ok) {
          throw new Error(data.error || "LINE連携に失敗しました");
        }

        setLineStore(LINE_USER_KEY, JSON.stringify({
          line_user_id: data.line_user_id,
          display_name: data.display_name || "",
          is_friend: !!data.is_friend,
        }));

        if (data.is_friend) {
          removeLineStore(LINE_PENDING_FRIEND_KEY);
          goBack("index.html#line-linked");
          return;
        }

        if (openLineFriendAdd()) return;

        goBack("index.html#line-auto-add");
      } catch (err) {
        console.error(err);
        if (statusEl) {
          statusEl.textContent = "LINE連携に失敗しました。トップページに戻ります…";
        }
        goBack("index.html#line-error");
      }
    })();
  </script>
</body>
</html>
